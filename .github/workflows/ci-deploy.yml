name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy liveportfolio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build production app
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          NEXT_PUBLIC_PAYSTACK_BASIC_PLAN_CODE: ${{ secrets.NEXT_PUBLIC_PAYSTACK_BASIC_PLAN_CODE }}
          NEXT_PUBLIC_PAYSTACK_PRO_PLAN_CODE: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PRO_PLAN_CODE }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_ROOT_DOMAIN: ${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN }}
          NEXT_PUBLIC_META_PIXEL_ID: ${{ secrets.NEXT_PUBLIC_META_PIXEL_ID }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          ADMIN_METRICS_SECRET: ${{ secrets.ADMIN_METRICS_SECRET }}
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Verify build artifacts
        run: |
          test -d .next
          [ -d public ] || mkdir -p public
          echo "Build artifacts verified."

      - name: Copy built app to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key

          ssh -i /tmp/vps_key -p "$VPS_SSH_PORT" -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "mkdir -p /home/deploy/apps/liveportfolio__incoming"

          # Transfer build only — node_modules installed on VPS for correct ARM64 binaries
          rsync -az --delete \
            -e "ssh -i /tmp/vps_key -p $VPS_SSH_PORT -o StrictHostKeyChecking=no" \
            --exclude ".next/cache" \
            --exclude ".env.local" \
            .next public scripts package.json package-lock.json next.config.ts ecosystem.config.js deploy.sh \
            "$VPS_USER@$VPS_HOST:/home/deploy/apps/liveportfolio__incoming/"

      - name: Swap release, install deps, reload PM2
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key
          ssh -i /tmp/vps_key -p "$VPS_SSH_PORT" \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            "$VPS_USER@$VPS_HOST" \
            "bash /home/deploy/apps/liveportfolio/scripts/vps-deploy.sh"
          rm -f /tmp/vps_key
