name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy liveportfolio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build production app
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_ROOT_DOMAIN: ${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN }}
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Verify build artifacts
        run: |
          echo "Checking .next directory..."
          test -d .next
          if [ -d public ]; then
            echo "public directory exists."
          else
            echo "public directory missing; creating empty public directory."
            mkdir -p public
          fi
          echo "Build artifacts are present."

      - name: Copy built app to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key

          ssh -i /tmp/vps_key -p "$VPS_SSH_PORT" -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "mkdir -p /home/deploy/apps/liveportfolio__incoming"

          rsync -az --delete \
            -e "ssh -i /tmp/vps_key -p $VPS_SSH_PORT -o StrictHostKeyChecking=no" \
            --exclude ".next/cache" \
            .next public scripts package.json package-lock.json next.config.ts ecosystem.config.js deploy.sh \
            "$VPS_USER@$VPS_HOST:/home/deploy/apps/liveportfolio__incoming/"

      - name: Install production dependencies and reload PM2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            set -e
            cd /home/deploy/apps
            test -d liveportfolio__incoming

            rm -rf liveportfolio__previous
            if [ -d liveportfolio ]; then
              mv liveportfolio liveportfolio__previous
            fi
            mv liveportfolio__incoming liveportfolio

            cd /home/deploy/apps/liveportfolio
            if npm ci --omit=dev; then
              pm2 startOrReload ecosystem.config.js --env production --update-env
            else
              echo "npm ci failed; rolling back to previous release"
              cd /home/deploy/apps
              rm -rf liveportfolio
              if [ -d liveportfolio__previous ]; then
                mv liveportfolio__previous liveportfolio
              fi
              exit 1
            fi

            # Install/update health-check cron (idempotent)
            chmod +x /home/deploy/apps/liveportfolio/scripts/health-check.sh
            mkdir -p /home/deploy/logs
            RESEND_KEY=$(grep RESEND_API_KEY /home/deploy/apps/liveportfolio/.env.local | cut -d= -f2- | tr -d '"' | tr -d "'")
            CRON_JOB="0 6 * * * RESEND_API_KEY=${RESEND_KEY} /home/deploy/apps/liveportfolio/scripts/health-check.sh >> /home/deploy/logs/health-check.log 2>&1"
            (crontab -l 2>/dev/null | grep -v "health-check.sh"; echo "$CRON_JOB") | crontab -
