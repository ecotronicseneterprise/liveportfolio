name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy liveportfolio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build production app
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_ROOT_DOMAIN: ${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN }}
          ADMIN_METRICS_SECRET: ${{ secrets.ADMIN_METRICS_SECRET }}
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Verify build artifacts
        run: |
          test -d .next
          [ -d public ] || mkdir -p public
          echo "Build artifacts verified."

      - name: Copy built app to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key

          ssh -i /tmp/vps_key -p "$VPS_SSH_PORT" -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "mkdir -p /home/deploy/apps/liveportfolio__incoming"

          # Transfer build only — node_modules installed on VPS for correct ARM64 binaries
          rsync -az --delete \
            -e "ssh -i /tmp/vps_key -p $VPS_SSH_PORT -o StrictHostKeyChecking=no" \
            --exclude ".next/cache" \
            --exclude ".env.local" \
            .next public scripts package.json package-lock.json next.config.ts ecosystem.config.js deploy.sh \
            "$VPS_USER@$VPS_HOST:/home/deploy/apps/liveportfolio__incoming/"

      - name: Swap release, install deps, reload PM2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            set -e
            cd /home/deploy/apps
            test -d liveportfolio__incoming

            # Preserve .env.local across deploys
            if [ -d liveportfolio ] && [ -f liveportfolio/.env.local ]; then
              cp liveportfolio/.env.local liveportfolio__incoming/.env.local
            fi

            # Reuse existing node_modules — move it into incoming before swap
            # This avoids running npm install on every deploy (OOM risk on ARM64)
            if [ -d liveportfolio/node_modules ]; then
              mv liveportfolio/node_modules liveportfolio__incoming/node_modules
            fi

            # Now safe to delete previous (no node_modules inside liveportfolio anymore)
            rm -rf liveportfolio__previous 2>/dev/null || true
            [ -d liveportfolio ] && mv liveportfolio liveportfolio__previous
            mv liveportfolio__incoming liveportfolio

            cd /home/deploy/apps/liveportfolio

            # Only run npm install if package.json changed vs previous release
            PREV_PKG="/home/deploy/apps/liveportfolio__previous/package.json"
            CURR_PKG="/home/deploy/apps/liveportfolio/package.json"
            if [ ! -d node_modules ] || ! diff -q "$PREV_PKG" "$CURR_PKG" > /dev/null 2>&1; then
              echo "package.json changed or node_modules missing — running npm install"
              if ! swapon --show | grep -q /swapfile; then
                sudo swapon /swapfile 2>/dev/null || true
              fi
              npm install --omit=dev || { echo "npm install failed; rolling back"; cd /home/deploy/apps; rm -rf liveportfolio; [ -d liveportfolio__previous ] && mv liveportfolio__previous liveportfolio; exit 1; }
            else
              echo "package.json unchanged — skipping npm install"
            fi

            pm2 startOrReload /home/deploy/apps/liveportfolio/ecosystem.config.js --env production --update-env

            # Install/update health-check cron (idempotent)
            chmod +x /home/deploy/apps/liveportfolio/scripts/health-check.sh
            mkdir -p /home/deploy/logs
            RESEND_KEY=$(grep RESEND_API_KEY /home/deploy/apps/liveportfolio/.env.local | cut -d= -f2- | tr -d '"' | tr -d "'")
            METRICS_SECRET=$(grep ADMIN_METRICS_SECRET /home/deploy/apps/liveportfolio/.env.local | cut -d= -f2- | tr -d '"' | tr -d "'")
            CRON_JOB="0 6 * * * RESEND_API_KEY=${RESEND_KEY} ADMIN_METRICS_SECRET=${METRICS_SECRET} /home/deploy/apps/liveportfolio/scripts/health-check.sh >> /home/deploy/logs/health-check.log 2>&1"
            (crontab -l 2>/dev/null | grep -v "health-check.sh"; echo "$CRON_JOB") | crontab -
